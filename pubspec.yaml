name: flutter_application_1
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  local_auth: ^3.0.0
  excel: ^4.0.6
  path_provider: ^2.1.2
  open_file_plus: ^3.4.1
  shared_preferences: ^2.5.3
  cupertino_icons: ^1.0.6
  file_picker: ^10.3.10
  file_saver: ^0.3.1  # <--- AJOUTEZ CETTE LIGNE
  flutter_svg: ^2.2.3




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/oms-logo.png
    - assets/images/icon.png
    - assets/images/icon1.png
    - assets/images/chantier+.png
    - assets/images/chantier-.svg


flutter_launcher_icons:
  image_path: "assets/images/icon.png"

  android: "launcher_icon"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"

  ios: true
